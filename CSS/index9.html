<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 100px;
            height: 100px;
            margin-bottom:10px;
            background-color:red;
            transition-property: background-color,width;/*none,all혹은 지금처럼 특정 속성도 가능. 전환 효과를 적용할 대상 지정임*/
            transition-duration: 2s;/*2000ms임*/
            /*transition-delay:0s;*//*시작하기 전 딜레이*/
            /*transition-timing-function:*//*linear,ease,ease-in,ease-out,ease-in-out,cubic-bezier(p1,p2,p3,p4)*/
            /*각자마다 처음,마지막 속도 일정,점점 빨라지다가 중간에 느려짐,느리다가 빨라짐,빠르다가 완료까지 느려짐
            느리다 빠르다 느려짐,정의한 속도로 진행임*/
        }
        body:hover .box{/*마우스 갖다되면 색 바뀜*/
            width:500px;
            background-color: blue;
        }
        .box:nth-of-type(1){
            transition-timing-function:linear;
        }
        .box:nth-of-type(2){
            transition-timing-function:ease;
        }
        .box:nth-of-type(3){
            transition-timing-function:ease-in;
        }
        .box:nth-of-type(4){
            transition-timing-function:ease-out;
        }
        .box:nth-of-type(5){
            transition-timing-function:ease-in-out;
        }
    </style>
</head>
<body>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
</body>
</html>
