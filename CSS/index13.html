<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            color: white;
            background-color: #c9c9c9;
            padding: 1rem;
            height: 400px;

            display: flex;/*대충 저 글자들이 가로 아니면 세로 쪽으로 자기가 가져야 할 크기를 알아서 갖게 끔 하는 거*/
            /*flex-direction:row;/*flex방향 정하기(column 아니면 row) 혹은 (row/column)-reverse*/
            /*flex-wrap:wrap;/*원래 div width:400px해도 개발자 도구에서 보면 400이 아닌 걸 볼 수 있고
            이유는 flex item은 원래 flex container의 크기를 벗어나지 못 하도록 설정되어 있어서
            wrap이라 지정하면 400씩 됌*/
            flex-flow:row wrap;/*위에 column,wrap을 이거 하나로 가능*/
            justify-content: space-evenly;/*시작 방향으로 정렬해라가 start end는 진행방향의 끝방향으로 감 등 많음*/
            align-items: center;/*세로 정렬 느낌*/
        }
        .box{
            background-color: red;
        }
        .box:nth-child(2n) {
            background-color: orange;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">A</div>
        <div class="box">B</div>
        <div class="box">C</div>
    </div>
</body>
</html>
