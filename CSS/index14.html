<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            color:white;
            background-color:#c9c9c9;
            padding:1rem;
            height:400px;

            display:grid;/*그리드 아이템이 기존의 그리드를 전부 안 채우고 있었다면 그리드를 균등하게 전부 채움*/
            grid-template-columns: 50px 1fr;/*처음꺼가 1열 그다음이 2열 fr은 나머지 모든 공간을 다 차지하란 뜻*/
            grid-template-rows: 100px 1fr; /*위와 같이 처음이 1행 그다음이 2행 그리고 repeat(2,1fr)은 1fr을
            두번 반복하란 뜻 minmax라는 것도 있는데 그리드가 보면 화면이 작아지면 그리드 아이템은 자기 아이템이
            괜찮을 때 까지 작아지는데 minmax(최소,최대)로 최소 최대를 바꿀 수 있음*/
            row-gap: 10px;/*internet explorer 11에서는 안 된다고 함*/
            column-gap: 10px;
            /*justifiy-items:이건 아이템 기준 정렬 느낌?*/
            /*place-items로 위에 꺼 알아서 할 수 있음 혹은 더*/
            /*grid-template-areas:
            'A C'
            'D B'; grid-template- 대신 쓰는 느낌*/
        } .box {
            /* grid-column-start:1;
            grid-column-end:3; */
            /* grid-row-start:1;
            grid-row-end:3;  이것들은 알아서 찾기*/
            grid-column:1/3;
            background-color:red;
            /*place-self로 자기 혼자서 정렬 가능?*/
        } .box:nth-child(2n) {/*몰랐는데 여기서 저 2가 2n이 되면 2,4,6,8 이런 식인 듯*/
            background-color:orange;
        } .box:nth-child(3) {
            background-color:green;
        } .box:nth-child(4) {
            background-color:blue;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">A</div>
        <div class="box">B</div>
        <div class="box">C</div>
        <div class="box">D</div>
    </div>
</body>
</html>
