    <meta charset="UTF-8">

    <title>Document</title>
    <style>
        html,
        body{
            margin: 0;
            height: 100%;
        }
        body {
            background-image: url('./471765.jpg');
            background-repeat: no-repeat;/*또는 뒤에 -x혹은 -y를 통해서 기본적으론 이미지가 웹 브라우저의 남은 공간을 채워질 때까지 반복하지만 저걸 통해서 막을 수 있다.*/
            background-size: cover;/*<너비 높이>이렇게 px로도 가능하고 contain으로 가능한데 그냥 cover쓰기 그게 이미지 가로 세로 비율 유지하면서 크기를 확대하거나 축소해 요소의 배경에 꽉 채운다.*/
            background-position: center center;/*원래는 <x 위치> <y 위치> center로 하면 중앙으로 감 혹은 right,left,top,bottom*/
            background-attachment: fixed;/*fixed로 하면 스크롤 해도 이미지 고정 딴 것도 있는데 알아서 찾기*/
            /*background:color 속성값 image 속성값 등 이렇게 한 번에 지정 가능*/
        }
    </style>
