<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        .styleSet1{
            color: red;
            font-size:20px;
        }
    </style>
</head>
<body>
    <p id="title">Hello, <span style="display: none">Javascript!</span></p>
    <p id="textContent">hello, </p>
    <p id="innerText">hello, </p>
    <p id="innerHTML">hello, </p>
    <p id="text">text</p>
    <p id="ex_text">text</p>
    <button data-cnt="10">가방 구매</button>
    <button data-cnt="0">신발 구매</button>
    <a href="https://www.gilbut.co.kr">길벗</a>
    <script>
        const pEL = document.getElementsByTagName("p")[0];
        
        pEL.textContent = '   hello, new Content!   ';
        pEL.innerText = '   hello, new Content!   ';
        pEL.innerHTML = '   hello, new Content!   ';
        // console.log(pEL.textContent);//p태그의 모든 요소를 가져옴 참고로 textContent라서 tag는 가져오지 않고 text만 가져옴
        // console.log(pEL.innerText);//웹 브라우저의 실제 보이는 text만 가져옴
        // console.log(pEL.innerHTML);//tag를 포함한 모든 것을 가져옴

        document.querySelector("#textContent").textContent += 'hello, textContent';//아래와 반대로 공백까지 취급함
        document.querySelector("#innerText").innerText += 'hello, innerText';//얘는 그냥 보이는 것만 가져와서 공백은 취급 안 함
        document.querySelector("#innerHTML").innerHTML += '<strong>hello, innerHTML<strong>';//innerHTML은 태그를 이용한 삽입이 가능
        //반대로 다른 것들은 <strong>같은 태그들을 붙여도 그냥 글자 취급 함
        
        const pEL1 = document.getElementById("text");
        pEL1.style.color = "red";//background-color같은 - 가 들어간 것들은 그냥 무시하고 backgroundColor하면 됌
        pEL1.style.fontSize = '30px';
        
        const pEL2 = document.getElementsByTagName("p")[5];
        // pEL.classList.add("styleSet1");
        // pEL.classList.remove("styleSet1");//클래스 속성이 존재했던 속성값이 사라지는거임
        setInterval(()=>{//반복하는거임
            pEL2.classList.toggle("styleSet1");//클래스가 있으면 속성값을 없애고 없으면 클래스 추가
        }, 1000);

        const buttonEls = document.querySelectorAll("button");
        buttonEls.forEach((el)=>{
            el.dataset.cnt=50;
            console.log(el.dataset.cnt);//위에 만들때 data-cnt로 만들어서 cnt임 snt면 snt
        })

        const aEl = document.querySelector("a");
        console.log(aEl.getAttribute("href"));
        aEl.textContent = '네이버'; aEl.setAttribute("href", "https://www.naver.com");
        aEl.setAttribute("target","_blank");
        aEl.removeAttribute("target");
        aEl.setAttribute("class","styleSet1");//이렇게도 됌 대신 이건 재할당이라서 두개 이상의 클래스 넣기 힘듬
        //두개 이상의 클래스 넣으려면 add로 여러개 넣어야 할 듯
    </script>
</body>
</html>
