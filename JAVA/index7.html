<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대강 캔슬</title>
</head>
<body>
    <a href="https:www.naver.com">네이버 이동</a>
    <a href="https://www.youtube.com/">유튜브 이동</a>
    <p name="p1입니다.">p1</p>
    <p name="p2였네요.">p2</p>
    <p name="p3이군요">p3</p>
    <script>
        const a = document.querySelectorAll('a');
        a.forEach(el =>{
            el.addEventListener("click",(e)=>{
                e.preventDefault();
            })
        });
        const p = document.querySelectorAll('p');
        p.forEach((el)=>{
            el.addEventListener("click",(e) =>{
                console.log(e.target);//this 혹은 e.target 느낌으로 여러개의 엘리맨탈 중 골라진 것을 고를 수 있음
            })
        })
    </script>
</body>
</html>
